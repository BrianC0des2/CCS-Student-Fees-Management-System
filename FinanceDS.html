<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="UTF-8">
        <title> CCS PAY++ - Finance </title>
        <link rel="stylesheet" href="styles/style.css">
        <link rel="stylesheet" href="FinanceDS-style.css">
        <!-- Boxiocns CDN Link -->
        <link href='https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css' rel='stylesheet'>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div id="sidebar-container"></div>

        <section class="home-section">
            <div class="home-content">
                <i class='bx bx-menu' ></i>
                <span class="text">Organization Dashboard</span>
            </div>


        <div class="header">
            <div class="header-left">
                <img id="org-logo" src="/assets/images/org-ccs.png" alt="org-logo">
                <div id="org-info">
                    <h1>CCS Student Council</h1>
                    <p>A.Y. 2025-2026 | 2nd Semester</p></span>
                </div>
            </div>
        </div>

        
 
        
        <div class="summary-cards">
            <div class="card">
                <h3>Total Collected</h3>
                <p>₱48,550</p>
            </div>
            <div class="card">
                <h3>Pending Payments</h3>
                <p>23</p>
            </div>
            <div class="card">
                <h3>Fully Paid</h3>
                <p>156</p>
            </div>
            <div class="card">
                <h3>Total Students</h3>
                <p>342</p>
            </div>
        </div>


        <div class="search-filter">
    <input type="text" placeholder="Search by name or student no.">

    <select id="yearLevel" onchange="updateSections()">
        <option value="">Year Level</option>
        <option value="1">1st Year</option>
        <option value="2">2nd Year</option>
        <option value="3">3rd Year</option>
        <option value="4">4th Year</option>
    </select>

    <select id="course" onchange="updateSections()">
        <option value="">Course</option>
        <option value="BSCS">BS Computer Science</option>
        <option value="BSIT">BS Information Technology</option>
        <option value="ACT-AD">ACT AppDev</option>
        <option value="ACT-NET">ACT Networking</option>
    </select>

    <select id="section">
        <option value="">Section</option>
        <option value="">CS 4-A</option>
        <option value="">CS 4-B</option>
        <option value="">CS 3-A</option>
        <option value="">CS 3-B</option>
        <option value="">CS 2-A</option>
        <option value="">CS 2-B</option>
        <option value="">CS 1-A</option>
        <option value="">CS 1-B</option>

    </select>

    <button>Export to Excel </button>
</div>

    
        <div class="members-table">
            <h2>Student Records</h2>
            <table>
                <thead>
                    <tr>
                        <th>Student No.</th>
                        <th>Name</th>
                        <th>Year & Section</th>
                        <th>Amount Paid</th>
                        <th>Total Due</th>
                        <th>Status</th>
                        <th>Last Payment</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>

        <!-- PAYMENT HISTORY -->
        <div class="payment-history">
            <h2>Payment History</h2>
            <div class="history-filter">
                <select>
                    <option value="">School Year</option>
                    <option value="2025-2026">2025-2026</option>
                </select>
                <select>
                    <option value="">Semester</option>
                    <option value="1st">1st Semester</option>
                    <option value="2nd">2nd Semester</option>
                </select>
                <button>Export to Excel </button>
            </div>
        </div>

    </section>

    <script src="sample-accounts.js"></script>
    <script src="auth.js"></script>
    <script src="sidebar-template.js"></script>
    <script src="script.js"></script>
</body>
</html>
